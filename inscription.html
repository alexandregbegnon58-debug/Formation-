<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription | Alex Service Digital</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<section class="inscription">

<h1>Inscription</h1>

<p>Remplissez le formulaire ci-dessous pour réserver votre place.</p>

<form>

<input type="text" placeholder="Nom et prénom" required>

<input type="tel" placeholder="Téléphone" required>

<input type="email" placeholder="Adresse e-mail" required>

<select required>

<option>Choisissez une formation</option>

<option>Marketing Digital</option>

<option>Intelligence Artificielle</option>

<option>Rédaction Web</option>

<option>Community Management</option>

<option>Montage Vidéo</option>

</select>

<textarea placeholder="Votre message"></textarea>

<button type="submit">S'inscrire maintenant</button>

</form>

</section>

</body>

</html>
